<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>bang. — catalogue pièces</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ── RESET ── */
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased}
body{font-family:'League Spartan',sans-serif;background:#f4f2ee;color:#1a1a1a;font-size:14px;line-height:1.6}
button,input,select,textarea{font-family:inherit}
a{color:inherit;text-decoration:none}

/* ── LAYOUT ── */
.app{max-width:1080px;margin:0 auto;padding:1.5rem 1rem;position:relative;min-height:auto}

/* ── TOPBAR ── */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;padding-bottom:1.25rem;border-bottom:1px solid #e0ddd8;flex-wrap:wrap;gap:.75rem;background:#1a1a1a;margin:-1.5rem -1rem 2rem;padding:1rem 1.5rem;border-bottom:none;border-radius:0}
.logo{font-size:18px;font-weight:300;letter-spacing:.06em;color:#fff;text-transform:lowercase}
.logo span{color:#b8b0a0;font-style:italic;font-weight:300}
.nav{display:flex;gap:4px;flex-wrap:wrap}
.nb{padding:6px 14px;border:1px solid #3a3a3a;border-radius:2px;font-size:11px;letter-spacing:.07em;text-transform:uppercase;cursor:pointer;background:transparent;color:#888;transition:.15s}
.nb.active{background:#fff;color:#1a1a1a;border-color:#fff;font-weight:500}
.nb:hover:not(.active){border-color:#666;color:#ccc}
.nb.danger{border-color:#5a2a2a;color:#c06060}
.nb.danger:hover{border-color:#c06060;color:#e08080}

/* ── FILTER ── */
.filter-bar{display:flex;gap:6px;margin-bottom:1.25rem;flex-wrap:wrap;align-items:center}
.chip{padding:5px 14px;border:1px solid #d8d4ce;border-radius:2px;font-size:11px;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;background:#fff;color:#888;transition:.15s;white-space:nowrap}
.chip.active{border-color:#1a1a1a;color:#1a1a1a;background:#1a1a1a;color:#fff}
.chip:hover:not(.active){border-color:#999;color:#555}
.s-in{flex:1;min-width:130px;font-size:13px;padding:7px 13px;border:1px solid #d8d4ce;border-radius:2px;background:#fff;color:#1a1a1a;outline:none}
.s-in:focus{border-color:#1a1a1a}
.s-in::placeholder{color:#bbb}

/* ── STATS BAR ── */
.stats-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.25rem}
.stat-chip{padding:5px 12px;background:#fff;border:1px solid #e8e5e0;border-radius:2px;font-size:10px;letter-spacing:.05em;color:#888;white-space:nowrap}
.stat-chip strong{color:#1a1a1a;font-weight:600}

/* ── BASKET BAR ── */
.bbar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.75rem;padding:.875rem 1.25rem;border:1px solid #e0ddd8;border-radius:2px;margin-bottom:1.25rem;background:#fff}
.bbar-info{font-size:11px;color:#999;letter-spacing:.05em;text-transform:uppercase}
.bbar-info strong{color:#1a1a1a}
.bbar-btns{display:flex;gap:6px}

/* ── GRID ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1.25rem;margin-bottom:1.5rem}
.card{background:#fff;border:1px solid #e8e5e0;border-radius:2px;overflow:hidden;cursor:pointer;transition:.2s}
.card:hover{border-color:#aaa;box-shadow:0 4px 16px rgba(0,0,0,.08)}
.card.sel{border-color:#1a1a1a;box-shadow:0 0 0 2px #1a1a1a}
.c-img{width:100%;height:160px;background:#f8f7f4;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.c-img img{width:100%;height:100%;object-fit:contain;padding:8px;transition:.3s}
.card:hover .c-img img{transform:scale(1.03)}
.c-img-ph{font-size:10px;color:#ccc;letter-spacing:.06em;text-transform:uppercase}
.c-body{padding:11px 12px 12px;border-top:1px solid #f0ede8}
.c-cat{font-size:9px;color:#bbb;letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px}
.c-name{font-size:12px;font-weight:500;color:#1a1a1a;margin-bottom:4px;line-height:1.4}
.c-desc{font-size:11px;color:#999;line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:9px}
.c-foot{display:flex;align-items:center;justify-content:space-between}
.c-ref{font-size:9px;color:#ccc;letter-spacing:.05em}
.add-btn{width:26px;height:26px;border-radius:50%;border:1px solid #ddd;background:#fff;display:flex;align-items:center;justify-content:center;color:#aaa;font-size:15px;transition:.15s;line-height:1;flex-shrink:0}
.add-btn:hover{border-color:#1a1a1a;color:#1a1a1a}
.add-btn.on{border-color:#1a1a1a;background:#1a1a1a;color:#fff;font-weight:600}

/* ── SELECTION PANEL ── */
.sel-panel{background:#fff;border:1px solid #e8e5e0;border-radius:2px;padding:1.25rem;margin-bottom:1.25rem}
.sel-title{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#999;margin-bottom:1rem}
.sel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(95px,1fr));gap:.625rem}
.sel-item{text-align:center}
.sel-img{width:100%;height:80px;border-radius:2px;background:#f8f7f4;overflow:hidden;display:flex;align-items:center;justify-content:center;margin-bottom:5px;border:1px solid #eee}
.sel-img img{width:100%;height:100%;object-fit:contain;padding:4px}
.sel-name{font-size:10px;color:#333;line-height:1.35;margin-bottom:1px;font-weight:500}
.sel-cat{font-size:9px;color:#bbb;letter-spacing:.05em;text-transform:uppercase}

/* ── SECTION ── */
.section{background:#fff;border:1px solid #e8e5e0;border-radius:2px;padding:1.25rem;margin-bottom:1rem}
.sec-title{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#999;margin-bottom:1rem}

/* ── BUTTONS ── */
.btn{padding:8px 18px;font-size:11px;letter-spacing:.07em;text-transform:uppercase;border-radius:2px;cursor:pointer;font-weight:500;transition:.15s}
.btn-p{background:#1a1a1a;color:#fff;border:none}
.btn-p:hover{background:#333}
.btn-p:disabled{opacity:.35;cursor:not-allowed}
.btn-s{background:#fff;color:#555;border:1px solid #d8d4ce}
.btn-s:hover{border-color:#999;color:#222}
.btn-xs{padding:3px 9px;font-size:10px;letter-spacing:.04em;text-transform:uppercase;border:1px solid #d8d4ce;border-radius:2px;cursor:pointer;background:#fff;color:#888;transition:.12s}
.btn-xs:hover{border-color:#999;color:#333}
.btn-xs.del{border-color:#dcc;color:#c06060}
.btn-xs.del:hover{border-color:#c06060;background:#fff5f5}

/* ── MODE PILLS ── */
.mode-pills{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap}
.mode-pill{padding:5px 13px;border:1px solid #d8d4ce;border-radius:2px;font-size:11px;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;color:#999;background:#fff;transition:.15s}
.mode-pill.active{border-color:#1a1a1a;color:#fff;background:#1a1a1a}

/* ── INPUTS ── */
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:.875rem}
.field label{font-size:10px;letter-spacing:.07em;text-transform:uppercase;color:#999}
.field input,.field select,.field textarea{font-size:13px;padding:8px 11px;border:1px solid #d8d4ce;border-radius:2px;background:#fff;color:#1a1a1a;outline:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:#1a1a1a}
.field input::placeholder{color:#ccc}
.field .hint{font-size:10px;color:#bbb;margin-top:2px}

/* ── STATUS ── */
.status{font-size:11px;color:#999;display:flex;align-items:center;gap:7px;min-height:20px;margin-top:.75rem;letter-spacing:.02em}
.dot{width:6px;height:6px;border-radius:50%;background:#6a9a6a;flex-shrink:0}
.dot.spin{background:#c9a050;animation:blink 1s infinite}
.dot.err{background:#c06060}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}

/* ── URL ROW ── */
.url-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:.875rem}
.url-row input{flex:1;min-width:200px;font-size:13px;padding:9px 12px;border:1px solid #d8d4ce;border-radius:2px;background:#fff;color:#1a1a1a;outline:none}
.url-row input:focus{border-color:#1a1a1a}
.url-row input::placeholder{color:#ccc}
.ship-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:.5rem}
.ship-row label{font-size:10px;letter-spacing:.07em;text-transform:uppercase;color:#999}
.ship-row input{width:62px;font-size:13px;padding:6px 8px;border:1px solid #d8d4ce;border-radius:2px;background:#fff;color:#1a1a1a;outline:none}
.ship-row input:focus{border-color:#1a1a1a}

/* ── SCAN LIST ── */
.sc-item{display:flex;gap:10px;align-items:center;padding:10px 12px;border:1px solid #eee;border-radius:2px;margin-bottom:6px;cursor:pointer;transition:.12s;background:#fff}
.sc-item:hover{border-color:#aaa}
.sc-item.on{border-color:#1a1a1a;background:#fafaf8}
.sc-check{width:18px;height:18px;border-radius:2px;border:1px solid #d8d4ce;background:#fff;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;color:#1a1a1a;font-weight:600;transition:.12s}
.sc-check.on{background:#1a1a1a;border-color:#1a1a1a;color:#fff}
.sc-thumb{width:52px;height:52px;flex-shrink:0;border-radius:2px;background:#f8f7f4;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:9px;color:#ccc;border:1px solid #eee}
.sc-thumb img{width:100%;height:100%;object-fit:contain;padding:2px}
.sc-info{flex:1;min-width:0}
.sc-name{font-size:12.5px;color:#1a1a1a;margin-bottom:2px;font-weight:500}
.sc-meta{font-size:10px;color:#aaa;letter-spacing:.03em;margin-bottom:2px}
.sc-price{font-size:12px;font-weight:500;color:#555}
.sc-url{font-size:9px;color:#ccc;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.scan-top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:1rem}
.sc-desc-preview{font-size:10px;color:#aaa;margin-top:2px;line-height:1.4;font-style:italic}

/* ── ADMIN ── */
.stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin-bottom:1.25rem}
.stat{background:#fff;border:1px solid #e8e5e0;border-radius:2px;padding:.75rem 1rem}
.stat-l{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:#bbb;margin-bottom:4px}
.stat-v{font-size:20px;font-weight:300;color:#1a1a1a}
.adm-item{display:grid;grid-template-columns:62px 1fr auto;gap:12px;align-items:start;padding:12px 13px;border:1px solid #e8e5e0;border-radius:2px;margin-bottom:7px;background:#fff;transition:.12s}
.adm-item:hover{border-color:#aaa}
.adm-item.adm-sel{border-color:#1a1a1a;background:#fafaf8}
.adm-cb{width:18px;height:18px;border:1px solid #d8d4ce;border-radius:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#1a1a1a;transition:.12s;background:#fff;flex-shrink:0}
.adm-cb:hover{border-color:#1a1a1a}
.adm-cb.on{background:#1a1a1a;border-color:#1a1a1a;color:#fff}
.adm-thumb{width:56px;height:56px;border-radius:2px;background:#f8f7f4;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:9px;color:#ccc;flex-shrink:0;border:1px solid #eee;cursor:pointer}
.adm-thumb img{width:100%;height:100%;object-fit:contain;padding:3px}
.adm-name{font-size:12.5px;color:#1a1a1a;margin-bottom:2px;font-weight:500}
.adm-meta{font-size:10px;color:#bbb;margin-bottom:6px;letter-spacing:.02em}
.badges{display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.badge{font-size:10px;padding:2px 8px;border-radius:2px;letter-spacing:.02em}
.b-cost{background:#fdf8ee;color:#8a6a20;border:1px solid #f0e8cc}
.b-ship{background:#eef4fd;color:#2a5a8a;border:1px solid #ccddf0}
.b-total{background:#f5f4f0;color:#666;border:1px solid #e0ddd8}
.b-sell{background:#eefbee;color:#2a6a2a;border:1px solid #cceacc;display:flex;align-items:center;gap:4px}
.b-margin{background:#f5f4ff;color:#4a4a9a;border:1px solid #ddddf0}
.b-warn{background:#fff5f5;color:#c06060;border:1px solid #f0cccc}
.sell-inp{width:60px;font-size:11px;padding:1px 5px;border:1px solid #aadaaa;border-radius:2px;background:transparent;color:#2a6a2a;outline:none}
.adm-acts{display:flex;flex-direction:column;gap:4px;align-items:flex-end}
.link-pill{display:inline-flex;align-items:center;gap:2px;font-size:9px;padding:2px 6px;border:1px solid #e0ddd8;border-radius:2px;color:#aaa;letter-spacing:.04em;text-transform:uppercase}
.link-pill:hover{border-color:#1a1a1a;color:#1a1a1a}

/* ── LOGIN ── */
.login-wrap{display:flex;align-items:flex-start;justify-content:center;padding-top:1.5rem;padding-bottom:1.5rem}
.login-box{background:#fff;border:1px solid #e8e5e0;border-radius:2px;padding:2.5rem 2rem;width:100%;max-width:340px;text-align:center}
.login-box h2{font-size:12px;letter-spacing:.12em;text-transform:uppercase;font-weight:400;color:#999;margin-bottom:.4rem}
.login-box p{font-size:12px;color:#bbb;margin-bottom:1.75rem}
.login-box input{width:100%;font-size:13px;padding:10px 12px;border:1px solid #d8d4ce;border-radius:2px;background:#fff;color:#1a1a1a;margin-bottom:.75rem;outline:none}
.login-box input:focus{border-color:#1a1a1a}
.login-err{font-size:11px;color:#c06060;min-height:16px;margin-bottom:.625rem;letter-spacing:.03em}

/* ── MODAL INLINE (pas de fixed, compatible iframe mobile) ── */
.modal-inline{background:#fff;border:1px solid #e0ddd8;border-radius:3px;margin-bottom:1rem;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.12);animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
/* Zoom photo */
.zoom-overlay{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:500;display:flex;align-items:center;justify-content:center;cursor:zoom-out;animation:fadeIn .15s ease}
.zoom-overlay img{max-width:92vw;max-height:88vh;object-fit:contain;border-radius:2px;box-shadow:0 8px 40px rgba(0,0,0,.5)}
.zoom-close{position:fixed;top:1.25rem;right:1.25rem;width:36px;height:36px;background:rgba(255,255,255,.15);border:none;border-radius:50%;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s}
.zoom-close:hover{background:rgba(255,255,255,.3)}
.c-img-zoom{cursor:zoom-in}


/* ── DRAG & DROP ── */
.drop-zone{border:2px dashed #d8d4ce;border-radius:2px;padding:1.5rem 1rem;text-align:center;cursor:pointer;transition:.2s;background:#fafaf8;margin-bottom:.75rem;position:relative}
.drop-zone:hover,.drop-zone.drag-over{border-color:#1a1a1a;background:#f4f2ee}
.drop-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.drop-zone-icon{font-size:22px;color:#ccc;margin-bottom:.5rem}
.drop-zone-text{font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:#bbb}
.drop-zone-hint{font-size:10px;color:#ccc;margin-top:.25rem}
.drop-preview{width:100%;height:120px;object-fit:contain;border-radius:2px;border:1px solid #eee;margin-bottom:.625rem;background:#f8f7f4;padding:6px}

/* ── ALERTS ── */
.alert{padding:.75rem 1rem;border-radius:2px;font-size:12px;margin-bottom:1rem;line-height:1.5;letter-spacing:.02em}
.alert-warn{background:#fdf8ee;color:#8a6a20;border:1px solid #f0e8cc}
.alert-info{background:#eef4fd;color:#2a5a8a;border:1px solid #ccddf0}
.alert-ok{background:#eefbee;color:#2a6a2a;border:1px solid #cceacc}

/* ── SÉLECTIONS CLIENTS ── */
.sel-card{background:#fff;border:1px solid #e8e5e0;border-radius:2px;padding:1.25rem;margin-bottom:1rem}
.sel-card-head{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:1rem;padding-bottom:.875rem;border-bottom:1px solid #f0ede8}
.sel-card-name{font-size:15px;font-weight:500;color:#1a1a1a;margin-bottom:2px}
.sel-card-date{font-size:10px;color:#bbb;letter-spacing:.04em;text-transform:uppercase}
.sel-card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:.75rem}
.sel-card-item{text-align:center}
.sel-card-img{width:100%;height:75px;border-radius:2px;background:#f8f7f4;overflow:hidden;display:flex;align-items:center;justify-content:center;margin-bottom:5px;border:1px solid #eee}
.sel-card-img img{width:100%;height:100%;object-fit:contain;padding:4px}
.sel-card-pname{font-size:10px;font-weight:500;color:#333;line-height:1.3;margin-bottom:1px}
.sel-card-pcat{font-size:9px;color:#bbb;text-transform:uppercase;letter-spacing:.05em}

/* ── DOUBLONS ── */
.dup-badge{display:inline-block;background:#fff3cd;color:#856404;border:1px solid #ffc107;font-size:9px;padding:1px 7px;border-radius:2px;letter-spacing:.05em;margin-left:6px;vertical-align:middle}
.dup-item{border-left:3px solid #ffc107!important}
.dup-block{background:#fffbf0;border:1px solid #ffc107;border-radius:2px;padding:.875rem 1rem;margin-bottom:1rem}
.dup-block-title{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#856404;margin-bottom:.625rem;font-weight:600}
.dup-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #fde9a0;font-size:12px;color:#1a1a1a}
.dup-row:last-child{border:none;padding-bottom:0}
.dup-thumb{width:36px;height:36px;border-radius:2px;background:#f5f3ef;overflow:hidden;flex-shrink:0;border:1px solid #eee}
.dup-thumb img{width:100%;height:100%;object-fit:contain}

/* ── EMPTY ── */
.empty{text-align:center;padding:3rem;color:#ccc;font-size:11px;letter-spacing:.06em;text-transform:uppercase;grid-column:1/-1}

/* ── UPLOAD ZONE (scanner) ── */
.upload-zone{display:block;border:2px dashed #d8d4ce;border-radius:2px;padding:2rem 1rem;text-align:center;cursor:pointer;transition:.15s;background:#fafaf8;margin-bottom:.875rem;position:relative}
.upload-zone:hover{border-color:#1a1a1a;background:#f4f2ee}

/* ── RESPONSIVE ── */
@media(max-width:600px){
  .app{padding:0 0 1rem}
  .topbar{margin:0 0 1.25rem;border-radius:0;padding:.875rem 1rem}
  .logo{font-size:16px}
  .nb{padding:5px 10px;font-size:10px}
  .grid{grid-template-columns:repeat(2,1fr);gap:.75rem;padding:0 .75rem}
  .filter-bar{padding:0 .75rem}
  .bbar{margin:0 .75rem 1rem;border-radius:2px}
  .btn{padding:7px 13px;font-size:10px}
  .adm-item{grid-template-columns:44px 1fr auto;gap:8px;padding:9px 10px}
  .adm-thumb{width:44px;height:44px}
  .modal-img{height:180px}
  .modal-body{padding:1rem 1.25rem 1.25rem}
  .stat-row{grid-template-columns:repeat(2,1fr)}
  .url-row input{min-width:150px}
  .scan-top{flex-direction:column;align-items:stretch}
  .section{border-radius:0;border-left:none;border-right:none}
}

/* ── NOUVEAUTÉS ── */
.new-section{margin-bottom:1.75rem}
.new-label{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:#1a1a1a;font-weight:600;margin-bottom:.875rem;display:flex;align-items:center;gap:8px}
.new-label::after{content:'';flex:1;height:1px;background:#e8e5e0}
.badge-new{position:absolute;top:8px;left:8px;background:#1a1a1a;color:#fff;font-size:9px;letter-spacing:.06em;text-transform:uppercase;padding:3px 7px;font-family:inherit;font-weight:500;z-index:1}
.adm-new-btn{width:24px;height:24px;border-radius:50%;border:1px solid #ddd;background:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;transition:.2s;cursor:pointer;line-height:1;color:#ddd}
.adm-new-btn.on{border-color:#1a1a1a;background:#1a1a1a;color:#fff}
.adm-new-btn:hover:not(.on){border-color:#888;color:#888}
</style>
</head>
<body>

<!-- ══════════════════════════════════════════════════════
     ⚙️  CONFIGURATION — À MODIFIER AVANT DÉPLOIEMENT
══════════════════════════════════════════════════════ -->
<script>

/* ══ AI PROXY — Gemini ══ */
async function callAI({ system, messages, max_tokens, useSearch, image }) {
  const r = await fetch('/api/ai-proxy', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ system, messages, max_tokens, useSearch, image }),
  });
  const data = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(data.error || `Erreur proxy HTTP ${r.status}`);
  if (data.error) throw new Error(data.error);
  console.log('[Gemini] réponse :', data.text?.slice(0, 120));
  return data;
}

async function generateDesc(name, rawDesc, cat) {
  try {
    const data = await callAI({
      system: 'Tu es un assistant qui renomme des pieces horlogeres. Reponds avec exactement 2 lignes, rien dautre:\nLIGNE1: le titre en francais (5 mots max, type+style+couleur, sans mm/NH35/ETA/Movement/Lume/Automatic)\nLIGNE2: une description sobre en francais (15-25 mots, sans prix)\nExemple pour "Sunburst Dial Refraction 28.5mm gradient red NH35":\nCadran sunburst refraction - Rouge gradue\nCadran a finition sunburst avec effet refraction, disponible en rouge gradue, compatible mouvements NH35.',
      messages: [{ role:'user', content:'Piece: '+name+' | Categorie: '+cat }],
      max_tokens: 100,
      model: 'claude-haiku-4-5-20251001',
    });
    const txt = (extractText(data) || '').trim();
    console.log('[generateDesc] reponse:', txt.slice(0,150));
    const lines = txt.split('\n').map(function(l){ return l.replace(/^LIGNE\d+:?\s*/i,'').trim(); }).filter(function(l){ return l.length>2; });
    const title = lines[0] || name;
    const desc = lines[1] || '';
    return { title: title, desc: desc };
  } catch(err) {
    console.error('[generateDesc] erreur:', err.message);
    return { title: name, desc: '' };
  }
}

/* ══ DETECT SITE TYPE ══ */
function detectUrlType(url) {
  try {
    const u = new URL(url);
    const h = u.hostname.replace('www.','');
    if (u.pathname.match(/\/collections\/[^\/\?]+/)) return { type:'shopify', hostname:h, cleanHost:`https://${u.hostname}`, collection:u.pathname.match(/\/collections\/([^\/\?]+)/)[1] };
    // Produit Shopify individuel : /products/nom ou /fr/products/nom
    const prodMatch = u.pathname.match(/\/products\/([^\/\?]+)/);
    if (prodMatch) return { type:'shopify_product', hostname:h, cleanHost:`https://${u.hostname}`, handle:prodMatch[1] };
    if (h.includes('aliexpress')) {
      const m = url.match(/\/item\/(\d+)/);
      if (m) return { type:'aliexpress', itemId:m[1] };
      return { type:'aliexpress_unknown' };
    }
    return { type:'unknown' };
  } catch { return { type:'unknown' }; }
}

/* ══ SHOPIFY API ══ */
async function fetchShopify(info) {
  // Pagination : max 250 par page, on récupère toutes les pages
  let all = [];
  let page = 1;
  while(true) {
    const r = await fetch(info.cleanHost+'/collections/'+info.collection+'/products.json?limit=250&page='+page);
    if (!r.ok) throw new Error('API Shopify inaccessible');
    const d = await r.json();
    const prods = d.products||[];
    all = all.concat(prods);
    setSt('Chargement... '+all.length+' produits récupérés','loading');
    if(prods.length < 250) break; // dernière page
    page++;
    if(page > 20) break; // sécurité max 5000 produits
  }
  return all;
}

async function fetchShopifyProduct(info) {
  // Produit individuel : récupère toutes les variantes
  const r = await fetch(`${info.cleanHost}/products/${info.handle}.json`);
  if (!r.ok) throw new Error('Produit Shopify introuvable');
  const d = await r.json();
  const p = d.product;
  if (!p) throw new Error('Format produit invalide');
  // Créer un item par variante (couleur, finition...)
  const items = [];
  const baseImg = p.images?.[0]?.src || '';
  // Grouper les variantes par première option (ex: couleur)
  const seen = new Set();
  for (const v of (p.variants||[])) {
    const label = v.option1 || v.title;
    if (seen.has(label)) continue;
    seen.add(label);
    // Trouver l'image correspondant à cette variante
    const variantImg = p.images?.find(img => img.variant_ids?.includes(v.id))?.src || baseImg;
    items.push({
      title: p.title + (label && label!=='Default Title' ? ' — '+label : ''),
      images: variantImg ? [{src: variantImg}] : [],
      variants: [v],
      body_html: p.body_html || '',
      handle: p.handle,
    });
  }
  return items.length ? items : [p];
}

const CAT_MAP = {
  'bezel insert':'Insert lunette','bezel':'Lunette','dial':'Cadran','hands':'Aiguilles','hand':'Aiguilles',
  'case':'Boîtier','crown':'Couronne','crystal':'Verre','bracelet':'Bracelet','strap':'Bracelet',
  'movement':'Mouvement','rotor':'Rotor','stem':'Axe','gasket':'Joint','spring bar':'Barre ressort',
  'chapter ring':'Anneau','back':'Fond','tube':'Tube couronne',
};

function detectCat(name) {
  const nl = name.toLowerCase();
  for (const [k,v] of Object.entries(CAT_MAP)) if (nl.includes(k)) return v;
  return 'Autre';
}

function shopifyToRaw(products, supplier) {
  return products.map(p => ({
    name: p.title,
    cat: detectCat(p.title),
    rawDesc: (p.body_html||'').replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim(),
    img: p.images?.[0]?.src || '',
    url: `https://${supplier.replace('www.','')}${p.handle?'/products/'+p.handle:''}`,
    price: parseFloat(p.variants?.[0]?.price||0),
    supplier,
  }));
}

/* ══ SCREENSHOT ANALYSER ══ */
async function resizeImage(file, maxWidth=1280) {
  return new Promise((resolve) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      const scale = Math.min(1, maxWidth / img.width);
      const canvas = document.createElement('canvas');
      canvas.width = Math.round(img.width * scale);
      canvas.height = Math.round(img.height * scale);
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      URL.revokeObjectURL(url);
      resolve(canvas.toDataURL('image/jpeg', 0.85).split(',')[1]);
    };
    img.src = url;
  });
}

async function analyzeScreenshot(base64) {
  const data = await callAI({
    system: `Tu analyses une capture d'écran d'une page produit (AliExpress, Alibaba, n'importe quel site).
Extrait les informations visibles et retourne UNIQUEMENT un objet JSON valide, sans markdown :
{"name":"nom exact du produit","cat":"catégorie parmi : Cadran, Boîtier, Bracelet, Mouvement, Couronne, Fond, Verre, Lunette, Aiguilles, Rotor, Joint, Autre","rawDesc":"description technique visible sur la page","price":prix_numerique_ou_0,"supplier":"nom du site détecté"}
Prends le prix unitaire le plus bas visible. Commence directement par {`,
    messages: [{ role:'user', content:'Analyse cette capture produit et retourne les données JSON.' }],
    max_tokens: 600,
    image: { mimeType: 'image/jpeg', data: base64 },
  });
  const txt = extractText(data);
  if (!txt) throw new Error('Pas de réponse — vérifiez la clé GEMINI_API_KEY sur Netlify');
  const m = txt.replace(/```json|```/g,'').match(/\{[\s\S]*\}/);
  if (!m) throw new Error('Gemini a répondu mais sans JSON valide. Réessayez.');
  const p = JSON.parse(m[0]);
  return [{
    name: p.name || 'Pièce importée',
    cat: p.cat || detectCat(p.name||''),
    rawDesc: p.rawDesc || '',
    img: '',
    url: '',
    price: p.price || 0,
    supplier: p.supplier || 'Import',
  }];
}

function buildStatsBar(){
  if(!items.length) return '';
  const total = items.length;
  // Compter par catégorie
  const counts = {};
  items.forEach(function(i){ counts[i.cat] = (counts[i.cat]||0)+1; });
  const cats_sorted = Object.keys(counts).sort(function(a,b){ return counts[b]-counts[a]; });
  let html = '<div class="stats-bar">';
  html += '<div class="stat-chip">Total : <strong>'+total+'</strong> pièce'+(total>1?'s':'')+'</div>';
  cats_sorted.forEach(function(c){
    if(!c) return;
    html += '<div class="stat-chip">'+c+' : <strong>'+counts[c]+'</strong></div>';
  });
  html += '</div>';
  return html;
}

function buildCards(){
  var q=(document.getElementById('search')||{}).value||'';
  var list=items.filter(function(i){
    return (filterCat==='Tout'||i.cat===filterCat)&&
      (!q||i.name.toLowerCase().includes(q.toLowerCase())||(i.description||'').toLowerCase().includes(q.toLowerCase()));
  });
  if(!list.length) return '<div class="empty">Aucune pièce</div>';
  function oneCard(i){
    var sel=basket.has(i.id);
    var imgH=i.img?('<img src="'+i.img+'" alt="" onerror="this.style.display=\'none\'">'):('<span class="c-img-ph">Aucune photo</span>');
    var nb=i.is_new?'<span class="badge-new">&#9733; Nouveau</span>':'';
    var btn='<button class="add-btn'+(sel?' on':'')+'" onclick="toggleB(\''+i.id+'\')">'+( sel?'&#10003;':'+')+'</button>';
    return '<div class="card'+(sel?' sel':'')+'" id="crd-'+i.id+'" style="position:relative">'
      +nb+'<div class="c-img" onclick="openModal(\''+i.id+'\')">'+imgH+'</div>'
      +'<div class="c-body"><div class="c-cat">'+(i.cat||'')+'</div>'
      +'<div class="c-name" onclick="openModal(\''+i.id+'\')">'+i.name+'</div>'
      +'<div class="c-desc">'+(i.description||'')+'</div>'
      +'<div class="c-foot"><span class="c-ref">réf. '+String(i.id).slice(-4).toUpperCase()+'</span>'+btn+'</div>'
      +'</div></div>';
  }
  var news=list.filter(function(i){return i.is_new;});
  var rest=list.filter(function(i){return !i.is_new;});
  var html='';
  if(news.length){
    html+='<div class="new-section"><div class="new-label">Nouveautés</div><div class="grid" style="margin-bottom:0">'+news.map(oneCard).join('')+'</div></div>';
    if(rest.length) html+='<div class="new-label" style="margin-bottom:.875rem">Catalogue</div>';
  }
  html+='<div class="grid">'+rest.map(oneCard).join('')+'</div>';
  return html;
}

async function doScan(){
  document.getElementById('bscan').disabled=true;
  document.getElementById('scan-res').innerHTML='';
  scanRes=[]; scanChecked.clear();
  try {
    let rawItems=[];
    if(scanMode==='shopify'){
      const url=document.getElementById('scan-url').value.trim();
      if(!url){setSt('Collez une URL de collection.','err');document.getElementById('bscan').disabled=false;return;}
      setSt('Connexion à l\'API Shopify...','loading');
      const info=detectUrlType(url);
      if(info.type==='shopify'){
        const prods=await fetchShopify(info);
        if(!prods.length){setSt('Aucun produit trouvé dans cette collection.','err');document.getElementById('bscan').disabled=false;return;}
        rawItems=shopifyToRaw(prods, info.hostname);
      } else if(info.type==='shopify_product'){
        setSt('Produit individuel détecté — récupération des variantes...','loading');
        const prods=await fetchShopifyProduct(info);
        if(!prods.length){setSt('Aucune variante trouvée.','err');document.getElementById('bscan').disabled=false;return;}
        rawItems=shopifyToRaw(prods, info.hostname);
      } else {
        setSt('URL non reconnue. Pour une collection : /collections/bezels — Pour un produit : /products/nom-produit','err');
        document.getElementById('bscan').disabled=false;return;
      }
    } else if(scanMode==='screenshot'){
      const input=document.getElementById('img-upload');
      if(!input||!input.files[0]){setSt('Sélectionnez d\'abord une capture d\'écran.','err');document.getElementById('bscan').disabled=false;return;}
      setSt('Compression et analyse de la capture en cours...','loading');
      const file=input.files[0];
      const base64 = await resizeImage(file);
      rawItems=await analyzeScreenshot(base64);
    } else {
      const url=document.getElementById('scan-url').value.trim();
      if(!url){setSt('Collez une URL.','err');document.getElementById('bscan').disabled=false;return;}
      setSt('Analyse IA en cours (30–40s)...','loading');
      rawItems=await fetchAiScan(url);
    }

    setSt(`${rawItems.length} pièce${rawItems.length>1?'s':''} trouvée${rawItems.length>1?'s':''}. Traduction et descriptions en français...`,'loading');
    for(let i=0;i<rawItems.length;i++){
      setSt('Traduction '+(i+1)+'/'+rawItems.length+'...','loading');
      const result = await generateDesc(rawItems[i].name, rawItems[i].rawDesc, rawItems[i].cat);
      rawItems[i].name = result.title || rawItems[i].name;
      rawItems[i].description = result.desc || '';
      // Pause anti-rate-limit entre chaque appel IA
      if(i < rawItems.length-1) await new Promise(function(r){setTimeout(r,1500);});
    }
    scanRes=rawItems;
    scanChecked=new Set(rawItems.map((_,i)=>i));
    renderScanResults();
    setSt(`${scanRes.length} pièce${scanRes.length>1?'s':''} prête${scanRes.length>1?'s':''} — descriptions en français générées.`,'');
  } catch(e){
    setSt('Erreur : '+e.message,'err');
  }
  const btn=document.getElementById('bscan'); if(btn) btn.disabled=false;
}

        ${scanRes.map((p,i)=>`
        <div class="sc-item${scanChecked.has(i)?' on':''}" onclick="togCheck(${i})" id="sci-${i}">

          <div class="sc-thumb">${p.img?`<img src="${p.img}" onerror="this.parentNode.innerHTML=''" alt="">`:''}</div>
          <div class="sc-info">
            <div class="sc-name">${p.name||'—'}${dupScanIds.has(String(i))?'<span class="dup-badge">doublon</span>':''}${existDupIds.has(String(i))?'<span class="dup-badge" style="background:#fde8e8;color:#c0392b;border-color:#e74c3c">déjà dans catalogue</span>':''}</div>

/* ══ ADMIN ══ */
let adminSelected = new Set();
let adminFilterCat = 'Tout';
let adminFilterSup = 'Tout';
let adminSort = 'date';
let adminSearch = '';

/* ══ DOUBLONS ══ */
function findDuplicates(list){
  // Normaliser le titre : minuscules, sans ponctuation ni espaces multiples
  function norm(s){ return (s||'').toLowerCase().replace(/[^a-z0-9à-ÿ]/g,' ').replace(/\s+/g,' ').trim(); }
  const groups={};
  list.forEach(function(item){
    const key=norm(item.name);
    if(!key) return;
    if(!groups[key]) groups[key]=[];
    groups[key].push(item);
  });
  // Ne garder que les groupes avec 2+ items
  return Object.values(groups).filter(function(g){return g.length>1;});
}

function buildDupBlock(dups, onDelete){
  if(!dups.length) return '';
  var html='<div class="dup-block">'
    +'<div class="dup-block-title">⚠ '+dups.reduce(function(a,g){return a+g.length;},0)+' doublons détectés dans '+dups.length+' groupe'+(dups.length>1?'s':'')+'</div>';
  dups.forEach(function(group){
    html+='<div style="margin-bottom:.625rem;padding-bottom:.625rem;border-bottom:1px solid #fde9a0">';
    group.forEach(function(item, idx){
      html+='<div class="dup-row">'
        +'<div class="dup-thumb">'+(item.img?'<img src="'+item.img+'" alt="">':'')+'</div>'
        +'<div style="flex:1;min-width:0"><div style="font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+item.name+'</div>'
        +'<div style="font-size:10px;color:#aaa">'+item.cat+'</div></div>'
        +(idx>0?'<button data-delid="'+item.id+'" data-delfn="'+onDelete+'" class="dup-del-btn" style="font-size:9px;padding:2px 8px;background:transparent;border:1px solid #ffc107;border-radius:2px;cursor:pointer;color:#856404;white-space:nowrap">Supprimer</button>':'<span style="font-size:9px;color:#aaa;padding:2px 8px">original</span>')
        +'</div>';
    });
    html+='</div>';
  });
  html+='</div>';
  return html;
}

function renderAdmin(){
  const totalCost=items.reduce(function(a,i){return a+Number(i.cost||0)+Number(i.ship||0);},0);
  const allCats=['Tout',...new Set(items.map(function(i){return i.cat;}).filter(Boolean))].sort();
  const allSups=['Tout',...new Set(items.map(function(i){return i.supplier;}).filter(Boolean))].sort();

  // Filtrer
  let list=items.filter(function(i){
    const matchCat=adminFilterCat==='Tout'||i.cat===adminFilterCat;
    const matchSup=adminFilterSup==='Tout'||i.supplier===adminFilterSup;
    const matchSearch=!adminSearch||i.name.toLowerCase().includes(adminSearch.toLowerCase());
    return matchCat&&matchSup&&matchSearch;
  });

  // Trier
  list=[...list].sort(function(a,b){
    if(adminSort==='nom') return (a.name||'').localeCompare(b.name||'','fr');
    if(adminSort==='cout') return (Number(a.cost||0)+Number(a.ship||0))-(Number(b.cost||0)+Number(b.ship||0));
    if(adminSort==='cout-desc') return (Number(b.cost||0)+Number(b.ship||0))-(Number(a.cost||0)+Number(a.ship||0));
    return Number(b.ts||0)-Number(a.ts||0); // date desc
  });

  const dups=findDuplicates(items);

  document.getElementById('view').innerHTML=`
    <div class="stat-row">
      <div class="stat"><div class="stat-l">Pièces</div><div class="stat-v">${items.length}</div></div>
      <div class="stat"><div class="stat-l">Coût catalogue</div><div class="stat-v">${Math.round(totalCost).toLocaleString('fr-FR')} €</div></div>
      <div class="stat"><div class="stat-l">Catégories</div><div class="stat-v">${cats().length-1}</div></div>
      <div class="stat"><div class="stat-l">Fournisseurs</div><div class="stat-v">${allSups.length-1}</div></div>
    </div>

    ${dups.length?buildDupBlock(dups,'delItem'):''}

    <div style="background:#fff;border:1px solid #e8e5e0;border-radius:2px;padding:1rem;margin-bottom:1rem">
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:.75rem">
        <input class="s-in" style="flex:1;min-width:160px" placeholder="Rechercher une pièce..." value="${adminSearch}" oninput="adminSearch=this.value;renderAdmin()">
        <select onchange="adminFilterCat=this.value;renderAdmin()" style="padding:7px 10px;border:1px solid #d4cfc8;border-radius:2px;font-family:inherit;font-size:12px;background:#fff;color:#1a1a1a;outline:none">
          ${allCats.map(function(c){return '<option value="'+c+'"'+(adminFilterCat===c?' selected':'')+'>'+c+'</option>';}).join('')}
        </select>
        <select onchange="adminFilterSup=this.value;renderAdmin()" style="padding:7px 10px;border:1px solid #d4cfc8;border-radius:2px;font-family:inherit;font-size:12px;background:#fff;color:#1a1a1a;outline:none;max-width:180px">
          ${allSups.map(function(s){return '<option value="'+s+'"'+(adminFilterSup===s?' selected':'')+'>'+s+'</option>';}).join('')}
        </select>
        <select onchange="adminSort=this.value;renderAdmin()" style="padding:7px 10px;border:1px solid #d4cfc8;border-radius:2px;font-family:inherit;font-size:12px;background:#fff;color:#1a1a1a;outline:none">
          <option value="date" ${adminSort==='date'?'selected':''}>Plus récent</option>
          <option value="nom" ${adminSort==='nom'?'selected':''}>Nom A→Z</option>
          <option value="cout" ${adminSort==='cout'?'selected':''}>Coût ↑</option>
          <option value="cout-desc" ${adminSort==='cout-desc'?'selected':''}>Coût ↓</option>
        </select>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
        <div style="display:flex;align-items:center;gap:8px">
          <button class="btn-xs" onclick="admToggleAll()">${adminSelected.size===list.length&&list.length>0?'Tout décocher':'Tout cocher'}</button>
          ${adminSelected.size>0?`<span style="font-size:11px;color:#999">${adminSelected.size} sélectionnée${adminSelected.size>1?'s':''}</span>`:''}
          <span style="font-size:11px;color:#bbb">${list.length} pièce${list.length>1?'s':''} affichée${list.length>1?'s':''}</span>
        </div>
        ${adminSelected.size>0?`<button class="btn-xs del" onclick="delSelected()">Supprimer (${adminSelected.size})</button>`:''}
      </div>
    </div>

    <div id="adm-list">
      ${list.length?list.map(admCard).join(''):`<div class="alert alert-info">Aucune pièce ne correspond aux filtres.</div>`}
    </div>`;
}

function admToggleAll(){
  // Sélectionner seulement les items visibles (filtrés)
  const visible=items.filter(function(i){
    const matchCat=adminFilterCat==='Tout'||i.cat===adminFilterCat;
    const matchSup=adminFilterSup==='Tout'||i.supplier===adminFilterSup;
    const matchSearch=!adminSearch||i.name.toLowerCase().includes(adminSearch.toLowerCase());
    return matchCat&&matchSup&&matchSearch;
  });
  const allSelected=visible.every(function(i){return adminSelected.has(i.id);});
  if(allSelected) visible.forEach(function(i){adminSelected.delete(i.id);});
  else visible.forEach(function(i){adminSelected.add(i.id);});
  renderAdmin();
}

function admToggle(id){
  adminSelected.has(id)?adminSelected.delete(id):adminSelected.add(id);
  renderAdmin();
}

async function delSelected(){
  if(!adminSelected.size) return;
  if(!confirm(`Supprimer ${adminSelected.size} pièce${adminSelected.size>1?'s':''} ?`)) return;
  for(const id of adminSelected){
    if(isConfigured()) await SB.remove(id);
    basket.delete(id);
  }
  items=items.filter(i=>!adminSelected.has(i.id));
  adminSelected.clear();
  renderAdmin();
}

function admCard(i){
  const tc=Number(i.cost||0)+Number(i.ship||0);
  const sel=adminSelected.has(i.id);
  return `<div class="adm-item${sel?' adm-sel':''}" id="adm-${i.id}">
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px">

function handleEditFile(input){
  if(input.files[0]) processEditFile(input.files[0]);
}

function processEditFile(file){
  const reader=new FileReader();
  reader.onload=async e=>{
    // Compresser avant stockage
    const base64 = await compressImage(e.target.result, 800);
    // Afficher preview
    const dc=document.getElementById('drop-content');
    if(dc) dc.innerHTML=`<img src="${base64}" class="drop-preview" alt=""><div class="drop-zone-text">Image chargée</div>`;
    // Stocker dans un champ caché
    let hidden=document.getElementById('edit-img-data');
    if(!hidden){ hidden=document.createElement('input'); hidden.type='hidden'; hidden.id='edit-img-data'; document.getElementById('edit-modal').appendChild(hidden); }
    hidden.value=base64;
    // Vider le champ URL
    const urlIn=document.getElementById('edit-img-url'); if(urlIn) urlIn.value='';
  };
  reader.readAsDataURL(file);
}

async function compressImage(dataUrl, maxW=800){
  return new Promise(res=>{
    const img=new Image();
    img.onload=()=>{
      const scale=Math.min(1,maxW/img.width);
      const c=document.createElement('canvas');
      c.width=Math.round(img.width*scale); c.height=Math.round(img.height*scale);
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      res(c.toDataURL('image/jpeg',0.82));
    };
    img.src=dataUrl;
  });
}

function handleEditUrl(url){
  if(!url) return;
  const dc=document.getElementById('drop-content');
  if(dc) dc.innerHTML=`<img src="${url}" class="drop-preview" onerror="this.style.display='none'" alt=""><div class="drop-zone-text">Aperçu URL</div>`;

    +'<button onclick="window.print()" style="background:#1a1a1a;color:#fff;border:none;padding:12px 36px;font-family:inherit;font-size:11px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;border-radius:2px">Imprimer / Enregistrer PDF</button>'
    +'</div>'
    +'<script>setTimeout(function(){window.print();},600);<\/script>'
    +'</body></html>';

  var w=window.open('','_blank','width=860,height=900');
  if(w){w.document.write(html);w.document.close();}
  closeDevis();
}

// Délégation globale pour tous les boutons de l'app
document.addEventListener('click', function(e){
  var t = e.target;
  // Doublons
  var dupBtn = t.closest('.dup-del-btn');
  if(dupBtn){ var id=dupBtn.getAttribute('data-delid'); var fn=dupBtn.getAttribute('data-delfn'); if(fn==='delItem'&&id) delItem(id); return; }
  // Sélections
  var selDevis = t.closest('[data-action="devis"]');
  if(selDevis){ openDevis(selDevis.getAttribute('data-id')); return; }
  var selDel = t.closest('[data-action="del"]');
  if(selDel){ deleteSel(selDel.getAttribute('data-id')); return; }
  // Édition pièce
  if(t.id==='btn-back-edit'||t.id==='btn-cancel-edit'){ closeEdit(); return; }
  if(t.id==='btn-save-edit'){ if(window._editId) saveEdit(window._editId); return; }
  if(t.id==='btn-regen-edit'){ if(window._editId) regenDesc(window._editId); return; }
});

init();

// Auto-resize iframe WordPress
function notifyHeight(){
  if(window.parent===window) return;
  var h=document.body.scrollHeight;
  window.parent.postMessage({type:'mwa-resize',height:h},'*');
}
var _lastH=0;
var _roTimer=null;
new ResizeObserver(function(){
  clearTimeout(_roTimer);
  _roTimer=setTimeout(function(){
    var h=document.body.scrollHeight;
    if(Math.abs(h-_lastH)>10){ _lastH=h; notifyHeight(); }
  },200);
}).observe(document.body);
notifyHeight();
</script>
